<svg width="920" height="300" viewBox="0 0 920 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MiniBrickCraze Data Embed</title>
  <desc id="desc">A simple visual card showing archived catalog metrics: sets, brands, categories, and fan builds.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E1A2B"/>
      <stop offset="0.55" stop-color="#123A5A"/>
      <stop offset="1" stop-color="#1D6A8A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7BDFF2"/>
      <stop offset="1" stop-color="#B2F7EF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#08101A" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="920" height="300" rx="24" fill="url(#bg)"/>

  <circle cx="780" cy="48" r="88" fill="#7BDFF2" fill-opacity="0.06"/>
  <circle cx="840" cy="22" r="52" fill="#B2F7EF" fill-opacity="0.08"/>
  <circle cx="58" cy="266" r="102" fill="#B2F7EF" fill-opacity="0.05"/>

  <text x="36" y="52" fill="#DFF7FF" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">MiniBrickCraze Data Archive</text>
  <text x="36" y="78" fill="#B7E7F3" font-size="14" font-family="Segoe UI, Arial, sans-serif">Tracking mini and micro building block sets where data is often fragmented.</text>

  <g filter="url(#soft)">
    <rect x="32" y="108" width="206" height="150" rx="16" fill="#0F2A40"/>
    <rect x="254" y="108" width="206" height="150" rx="16" fill="#0F2A40"/>
    <rect x="476" y="108" width="206" height="150" rx="16" fill="#0F2A40"/>
    <rect x="698" y="108" width="190" height="150" rx="16" fill="#0F2A40"/>
  </g>

  <rect x="32" y="108" width="206" height="7" rx="3.5" fill="url(#accent)"/>
  <rect x="254" y="108" width="206" height="7" rx="3.5" fill="url(#accent)"/>
  <rect x="476" y="108" width="206" height="7" rx="3.5" fill="url(#accent)"/>
  <rect x="698" y="108" width="190" height="7" rx="3.5" fill="url(#accent)"/>

  <text x="48" y="146" fill="#9BD3E8" font-size="13" font-family="Segoe UI, Arial, sans-serif">SETS ARCHIVED</text>
  <text x="48" y="210" fill="#FFFFFF" font-size="46" font-family="Segoe UI, Arial, sans-serif" font-weight="700">1,844</text>

  <text x="270" y="146" fill="#9BD3E8" font-size="13" font-family="Segoe UI, Arial, sans-serif">BRANDS INDEXED</text>
  <text x="270" y="210" fill="#FFFFFF" font-size="46" font-family="Segoe UI, Arial, sans-serif" font-weight="700">38</text>

  <text x="492" y="146" fill="#9BD3E8" font-size="13" font-family="Segoe UI, Arial, sans-serif">CATEGORIES MAPPED</text>
  <text x="492" y="210" fill="#FFFFFF" font-size="46" font-family="Segoe UI, Arial, sans-serif" font-weight="700">30</text>

  <text x="714" y="146" fill="#9BD3E8" font-size="13" font-family="Segoe UI, Arial, sans-serif">FAN BUILDS</text>
  <text x="714" y="210" fill="#FFFFFF" font-size="46" font-family="Segoe UI, Arial, sans-serif" font-weight="700">1</text>

  <text x="36" y="282" fill="#9FD3E5" font-size="12" font-family="Segoe UI, Arial, sans-serif">Snapshot source: minibrickcraze.com homepage catalog counters (Apr 2026)</text>
</svg>
